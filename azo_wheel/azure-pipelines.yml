# Azure DevOps CI/CD for azo_wheel
#
# CI: runs on every PR and push to main — lints, builds, tests.
# Release: manually triggered — bumps version, builds wheel, uploads to UC volume, tags commit.

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - azo_wheel/**

pr:
  branches:
    include:
      - main
  paths:
    include:
      - azo_wheel/**

variables:
  pythonVersion: "3.11"
  workingDirectory: azo_wheel
  # Set these in your ADO pipeline variables (mark DATABRICKS_TOKEN as secret):
  #   DATABRICKS_HOST: https://e2-demo-field-eng.cloud.databricks.com
  #   DATABRICKS_TOKEN: <your-PAT-or-service-principal-token>
  ucVolumePath: /Volumes/users/sol_ackerman/wheels
  # Azure Artifacts feed name — must match the feed you created in Artifacts
  artifactsFeed: azo-python-feed
  # Notebook test runner settings
  notebookPath: /Repos/sol.ackerman@databricks.com/osc/azo_wheel/notebooks/run_tests
  junitVolumePath: /Volumes/users/sol_ackerman/wheels/test-results

stages:
  # ──────────────────────────────────────────────
  # CI Stage — runs on every PR / push to main
  # ──────────────────────────────────────────────
  - stage: CI
    displayName: "CI: Lint, Build, Test"
    jobs:
      - job: BuildAndTest
        pool:
          vmImage: windows-latest
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: $(pythonVersion)

          - pwsh: pip install uv
            displayName: Install uv

          - pwsh: uv sync --dev
            displayName: Install dependencies
            workingDirectory: $(workingDirectory)

          - pwsh: |
              uv run black --check src\ tests\
            displayName: Lint (black)
            workingDirectory: $(workingDirectory)

          - pwsh: uv build --wheel
            displayName: Build wheel
            workingDirectory: $(workingDirectory)

          - pwsh: uv run pytest --junitxml=test-results.xml
            displayName: Run tests
            workingDirectory: $(workingDirectory)
            env:
              DATABRICKS_HOST: $(DATABRICKS_HOST)
              DATABRICKS_TOKEN: $(DATABRICKS_TOKEN)

          - task: PublishTestResults@2
            condition: succeededOrFailed()
            inputs:
              testResultsFormat: JUnit
              testResultsFiles: $(workingDirectory)\test-results.xml

  # ──────────────────────────────────────────────
  # Notebook Test Stage — runs tests on Databricks
  # ──────────────────────────────────────────────
  - stage: NotebookTest
    displayName: "Test: Run via Databricks Notebook"
    dependsOn: CI
    condition: succeeded()
    jobs:
      - job: RunNotebookTests
        pool:
          vmImage: windows-latest
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: $(pythonVersion)

          - pwsh: pip install databricks-cli
            displayName: Install Databricks CLI

          # Run the notebook with the junit_volume_path parameter.
          # The Databricks Repos notebook runs pytest and writes JUnit XML to the volume.
          - pwsh: |
              databricks jobs create --json '{
                "name": "ci-notebook-test-$(Build.BuildId)",
                "tasks": [{
                  "task_key": "run_tests",
                  "notebook_task": {
                    "notebook_path": "$(notebookPath)",
                    "base_parameters": {
                      "junit_volume_path": "$(junitVolumePath)"
                    },
                    "source": "WORKSPACE"
                  },
                  "environment_key": "Default"
                }]
              }' > job_response.json
              $JobId = (Get-Content job_response.json | ConvertFrom-Json).job_id
              Write-Host "Created job $JobId"
              Write-Host "##vso[task.setvariable variable=JOB_ID]$JobId"

              # Trigger the run
              databricks jobs run-now --job-id $JobId > run_response.json
              $RunId = (Get-Content run_response.json | ConvertFrom-Json).run_id
              Write-Host "Started run $RunId"
              Write-Host "##vso[task.setvariable variable=RUN_ID]$RunId"
            displayName: Launch notebook test run
            env:
              DATABRICKS_HOST: $(DATABRICKS_HOST)
              DATABRICKS_TOKEN: $(DATABRICKS_TOKEN)

          # Poll until the run completes
          - pwsh: |
              $RunId = "$(RUN_ID)"
              Write-Host "Waiting for run $RunId to complete..."
              while ($true) {
                $status = databricks runs get --run-id $RunId | ConvertFrom-Json
                $state = $status.state.life_cycle_state
                $result = $status.state.result_state
                Write-Host "  State: $state / $result"
                if ($state -eq "TERMINATED" -or $state -eq "SKIPPED" -or $state -eq "INTERNAL_ERROR") {
                  if ($result -ne "SUCCESS") {
                    Write-Host "##vso[task.logissue type=error]Notebook run failed with result: $result"
                    Write-Host "##vso[task.setvariable variable=NOTEBOOK_PASSED]false"
                  } else {
                    Write-Host "##vso[task.setvariable variable=NOTEBOOK_PASSED]true"
                  }
                  break
                }
                Start-Sleep -Seconds 30
              }
            displayName: Wait for notebook completion
            env:
              DATABRICKS_HOST: $(DATABRICKS_HOST)
              DATABRICKS_TOKEN: $(DATABRICKS_TOKEN)

          # Download JUnit XML from UC volume
          - pwsh: |
              New-Item -ItemType Directory -Force -Path test-results | Out-Null
              databricks fs cp "$(junitVolumePath)/test-results.xml" test-results/test-results.xml
              Write-Host "Downloaded test results"
            displayName: Download test results from volume
            condition: succeededOrFailed()
            env:
              DATABRICKS_HOST: $(DATABRICKS_HOST)
              DATABRICKS_TOKEN: $(DATABRICKS_TOKEN)

          # Publish results to Azure Pipelines
          - task: PublishTestResults@2
            displayName: Publish notebook test results
            condition: succeededOrFailed()
            inputs:
              testResultsFormat: JUnit
              testResultsFiles: test-results/test-results.xml
              testRunTitle: "Notebook Tests (Databricks)"

          # Clean up the one-off job
          - pwsh: |
              databricks jobs delete --job-id $(JOB_ID)
              Write-Host "Cleaned up job $(JOB_ID)"
            displayName: Cleanup CI job
            condition: always()
            env:
              DATABRICKS_HOST: $(DATABRICKS_HOST)
              DATABRICKS_TOKEN: $(DATABRICKS_TOKEN)

          # Fail the stage if the notebook run failed
          - pwsh: |
              if ("$(NOTEBOOK_PASSED)" -ne "true") {
                Write-Error "Notebook test run did not succeed"
                exit 1
              }
            displayName: Check notebook result
            condition: succeededOrFailed()

  # ──────────────────────────────────────────────
  # Release Stage — manually triggered
  # ──────────────────────────────────────────────
  - stage: Release
    displayName: "Release: Bump, Build, Publish"
    dependsOn:
      - CI
      - NotebookTest
    condition: and(succeeded(), eq(variables['Build.Reason'], 'Manual'))
    jobs:
      - job: PublishWheel
        pool:
          vmImage: windows-latest
        steps:
          - checkout: self
            persistCredentials: "true"

          - task: UsePythonVersion@0
            inputs:
              versionSpec: $(pythonVersion)

          - pwsh: pip install uv databricks-cli
            displayName: Install tools

          # BUMP_PART should be set as a pipeline variable when queuing manually.
          # Valid values: major, minor, patch (defaults to patch).
          - pwsh: |
              $BumpPart = if ($env:BUMP_PART) { $env:BUMP_PART } else { "patch" }
              $NewVersion = python scripts\bump_version.py $BumpPart
              Write-Host "##vso[task.setvariable variable=NEW_VERSION]$NewVersion"
              Write-Host "Bumped to $NewVersion"
            displayName: Bump version
            workingDirectory: $(workingDirectory)

          - pwsh: |
              uv sync --dev
              uv build --wheel
            displayName: Build wheel
            workingDirectory: $(workingDirectory)

          - pwsh: |
              $Wheel = Get-ChildItem dist\*.whl | Select-Object -First 1
              $WheelName = $Wheel.Name
              Write-Host "Uploading $WheelName to $(ucVolumePath)/"
              databricks fs cp $Wheel.FullName "$(ucVolumePath)/$WheelName" --overwrite
              Write-Host "Upload complete"
            displayName: Upload wheel to UC volume
            workingDirectory: $(workingDirectory)
            env:
              DATABRICKS_HOST: $(DATABRICKS_HOST)
              DATABRICKS_TOKEN: $(DATABRICKS_TOKEN)

          - task: TwineAuthenticate@1
            displayName: Authenticate with Azure Artifacts
            inputs:
              artifactFeed: $(artifactsFeed)

          - pwsh: |
              pip install twine
              twine upload -r $(artifactsFeed) --config-file $(PYPIRC_PATH) dist\*
            displayName: Publish wheel to Azure Artifacts
            workingDirectory: $(workingDirectory)

          - pwsh: |
              git config user.email "azure-pipelines@dev.azure.com"
              git config user.name "Azure Pipelines"
              git add pyproject.toml
              git commit -m "release: v$(NEW_VERSION)"
              git tag "v$(NEW_VERSION)"
              git push origin HEAD:main --tags
            displayName: Commit and tag release
            workingDirectory: $(workingDirectory)
